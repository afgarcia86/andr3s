name: Deploy to host (SSH)

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-host
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ---- React build ----
      - name: Install deps
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Detect build output folder
        id: out
        run: |
          echo "dir=out" >> $GITHUB_OUTPUT

      # ---- SSH setup ----
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if [ -n "${{ secrets.HOSTINGER_KNOWN_HOSTS }}" ]; then
            echo "${{ secrets.HOSTINGER_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          else
            # Fallback: fetch host key automatically (OK, but less strict than pinning)
            ssh-keyscan -p "${{ secrets.HOSTINGER_PORT }}" "${{ secrets.HOSTINGER_HOST }}" >> ~/.ssh/known_hosts
          fi

      # ---- Deploy React build ----
      - name: Deploy React build via rsync
        run: |
          rsync -az --delete \
            --exclude ".htaccess" \
            --exclude ".env" \
            -e "ssh -p ${{ secrets.HOSTINGER_PORT }}" \
            "${{ steps.out.outputs.dir }}/" \
            "${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_PUBLIC_HTML_PATH }}"

      # ---- Deploy PHP files ----
      - name: Deploy PHP via rsync
        run: |
          rsync -az \
            --exclude ".env" \
            --exclude ".git" \
            --exclude "node_modules" \
            -e "ssh -p ${{ secrets.HOSTINGER_PORT }}" \
            "api/" \
            "${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_PUBLIC_HTML_PATH }}/api/"
